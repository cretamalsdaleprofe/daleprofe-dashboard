<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaleProfe — Nuestro Impacto</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange:  #FF6B00;
      --purple:  #7B2D8B;
      --teal:    #00BFA5;
      --pink:    #E91E8C;
      --white:   #FFFFFF;
      --light:   #F7F7F7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--white);
      font-family: 'Nunito', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 48px;
      border-bottom: 2px solid #F0F0F0;
      flex-shrink: 0;
      background: var(--white);
    }

    .logo { height: 52px; object-fit: contain; }

    .header-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .since-badge {
      font-size: 17px;
      font-weight: 800;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .live-row { display: flex; align-items: center; gap: 7px; }

    .live-dot {
      width: 10px; height: 10px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.6); }
    }

    .live-label { font-size: 14px; font-weight: 800; color: var(--teal); text-transform: uppercase; }
    .last-updated { font-size: 13px; color: #aaa; font-weight: 600; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      min-height: 0;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 40px;
      border-right: 2px solid #F0F0F0;
      border-bottom: 2px solid #F0F0F0;
      position: relative;
      background: var(--white);
    }

    .card.hero {
      background: var(--light);
      padding: 24px 48px;
    }

    .card::after {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 6px;
      border-radius: 0 4px 4px 0;
    }
    .c-orange::after { background: var(--orange); }
    .c-purple::after { background: var(--purple); }
    .c-teal::after   { background: var(--teal); }
    .c-pink::after   { background: var(--pink); }
    .hero::after     { display: none; }

    .card-eyebrow {
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.2;
    }
    .card-eyebrow::before { content: '▶'; font-size: 13px; flex-shrink: 0; }
    .card.hero .card-eyebrow { font-size: 28px; }

    .card-value {
      font-size: 86px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      margin-bottom: 6px;
    }
    .card.hero .card-value { font-size: 98px; color: var(--orange); }

    .c-orange .card-value { color: var(--orange); }
    .c-purple .card-value { color: var(--purple); }
    .c-teal   .card-value { color: var(--teal);   }
    .c-pink   .card-value { color: var(--pink);   }

    /* Subtítulo más grande */
    .card-sub {
      font-size: 22px;
      font-weight: 700;
      color: #666;
      line-height: 1.3;
    }

    /* Número destacado dentro del subtítulo del hero */
    .card-sub .highlight {
      font-size: 32px;
      font-weight: 900;
      color: var(--orange);
    }

    /* Loading */
    .loading-screen {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      color:#aaa; font-size:20px; font-weight:700;
    }
    .spinner {
      width:48px; height:48px;
      border:5px solid #eee;
      border-top-color: var(--orange);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    footer {
      text-align: center;
      padding: 10px 0;
      font-size: 13px;
      color: #ccc;
      font-weight: 700;
      flex-shrink: 0;
      border-top: 1px solid #F0F0F0;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card:nth-child(1) { animation: fadeUp 0.4s 0.00s ease forwards; opacity:0; }
    .card:nth-child(2) { animation: fadeUp 0.4s 0.08s ease forwards; opacity:0; }
    .card:nth-child(3) { animation: fadeUp 0.4s 0.16s ease forwards; opacity:0; }
    .card:nth-child(4) { animation: fadeUp 0.4s 0.24s ease forwards; opacity:0; }
    .card:nth-child(5) { animation: fadeUp 0.4s 0.32s ease forwards; opacity:0; }
    .card:nth-child(6) { animation: fadeUp 0.4s 0.40s ease forwards; opacity:0; }
  </style>
</head>
<body>

<header>
  <img class="logo"
    src="https://www.daleprofe.cl/img/logo.svg"
    alt="daleProfe"
    onerror="this.style.display='none';document.getElementById('lf').style.display='block';"
  />
  <span id="lf" style="display:none;font-size:30px;font-weight:900;color:#FF6B00;">dale<span style="color:#333">Profe</span></span>

  <div class="header-meta">
    <div class="since-badge">Nuestro impacto desde 2019</div>
    <div class="live-row">
      <div class="live-dot"></div>
      <span class="live-label">Cifras en vivo</span>
      <span class="last-updated" id="lastUpdated">· Cargando…</span>
    </div>
  </div>
</header>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <span>Obteniendo cifras desde daleprofe.cl…</span>
</div>

<main id="mainGrid" style="display:none"></main>

<footer id="footerBar">daleprofe.cl · Se actualiza automáticamente cada 30 minutos</footer>

<script>
const REFRESH_MS = 30 * 60 * 1000;
const TARGET = "https://www.daleprofe.cl/nosotros";

const FALLBACK = {
  donaciones:      "$1.029.261.386",
  donantes:        "8.239",
  proyFinanciados: "2.191",
  profesores:      "1.354",
  colegios:        "705",
  estudiantes:     "339.544",
  activos:         "169"
};

function fetchConTimeout(url, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error("Timeout")), ms);
    fetch(url)
      .then(r => { clearTimeout(t); resolve(r); })
      .catch(e => { clearTimeout(t); reject(e); });
  });
}

const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

function parseStats(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const text = (doc.body.innerText || doc.body.textContent || "").replace(/\s+/g, " ");
  const f = p => { const m = text.match(p); return m ? m[1].trim() : null; };
  return {
    donaciones:      f(/Hemos recaudado\s*([\$\d\.\,]+)/i) || f(/([\$\d\.]{8,})\s*a trav/i),
    donantes:        f(/a trav[eé]s de\s*([\d\.]+)\s*donantes/i),
    proyFinanciados: f(/([\d\.]+)\s*Proyectos financiados/i),
    profesores:      f(/([\d\.]+)\s*Profesores beneficiados/i),
    colegios:        f(/([\d\.]+)\s*Colegios han participado/i),
    estudiantes:     f(/([\d\.]+)\s*Estudiantes beneficiados/i),
    activos:         f(/([\d\.]+)\s*Proyectos actualmente/i),
  };
}

async function fetchStats() {
  for (const pFn of PROXIES) {
    try {
      const res = await fetchConTimeout(pFn(TARGET), 12000);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const html = await res.text();
      if (html.length < 500) throw new Error("Respuesta vacía");
      const s = parseStats(html);
      if (s.proyFinanciados || s.donaciones || s.estudiantes) return s;
      throw new Error("Sin cifras");
    } catch(e) { console.warn("Proxy falló:", e.message); }
  }
  return FALLBACK;
}

function fmt(v) { return v || "—"; }

function renderCards(s) {
  document.getElementById("mainGrid").innerHTML = `
    <div class="card hero c-orange">
      <div class="card-eyebrow">Hemos recaudado</div>
      <div class="card-value">${fmt(s.donaciones)}</div>
      <div class="card-sub">a través de <span class="highlight">${fmt(s.donantes)}</span> donantes de todo el país</div>
    </div>
    <div class="card c-purple">
      <div class="card-eyebrow">Proyectos financiados</div>
      <div class="card-value">${fmt(s.proyFinanciados)}</div>
      <div class="card-sub">Ideas de profes que se hicieron realidad</div>
    </div>
    <div class="card c-purple">
      <div class="card-eyebrow">Profesores beneficiados</div>
      <div class="card-value">${fmt(s.profesores)}</div>
      <div class="card-sub">Docentes que llevaron sus ideas al aula</div>
    </div>
    <div class="card c-pink">
      <div class="card-eyebrow">Estudiantes beneficiados</div>
      <div class="card-value">${fmt(s.estudiantes)}</div>
      <div class="card-sub">Niños y jóvenes con nuevas experiencias</div>
    </div>
    <div class="card c-teal">
      <div class="card-eyebrow">Colegios han participado</div>
      <div class="card-value">${fmt(s.colegios)}</div>
      <div class="card-sub">Establecimientos de todo Chile</div>
    </div>
    <div class="card c-orange">
      <div class="card-eyebrow">Proyectos buscando financiamiento</div>
      <div class="card-value">${fmt(s.activos)}</div>
      <div class="card-sub">Proyectos activos ahora mismo</div>
    </div>
  `;
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("mainGrid").style.display = "grid";
  if (s === FALLBACK)
    document.getElementById("footerBar").textContent = "Mostrando últimas cifras conocidas · daleprofe.cl";
}

function setStatus(msg) {
  document.getElementById("lastUpdated").textContent = "· " + msg;
}

async function refresh() {
  setStatus("Actualizando…");
  try {
    const s = await fetchStats();
    renderCards(s);
    const hora = new Date().toLocaleTimeString("es-CL", { hour:"2-digit", minute:"2-digit" });
    setStatus(`Actualizado a las ${hora}`);
  } catch(e) {
    setStatus("Error al conectar — reintentando…");
    if (document.getElementById("mainGrid").style.display === "none") setTimeout(refresh, 60000);
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
