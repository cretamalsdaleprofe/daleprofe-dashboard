<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="refresh" content="1800"/>
  <title>DaleProfe — Nuestro Impacto</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--orange:#FF6B00;--purple:#7B2D8B;--pink:#E91E8C;--teal:#00BFA5;--white:#fff;--light:#F9F6FC}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;overflow:hidden}
    body{background:var(--white);font-family:'Nunito',sans-serif;display:flex;flex-direction:column}

    header{display:flex;align-items:center;justify-content:space-between;padding:10px 40px;border-bottom:2px solid #F0F0F0;flex-shrink:0}
    .logo{height:40px;object-fit:contain}
    .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .since-badge{font-size:13px;font-weight:800;color:var(--orange);text-transform:uppercase}
    .live-row{display:flex;align-items:center;gap:5px}
    .live-dot{width:7px;height:7px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
    .live-label{font-size:11px;font-weight:800;color:var(--teal);text-transform:uppercase}
    .last-updated{font-size:10px;color:#aaa;font-weight:600}

    .slides-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
    .slide{position:absolute;inset:0;opacity:0;transform:translateX(70px);transition:opacity .6s ease,transform .6s ease;pointer-events:none}
    .slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
    .slide.exit{opacity:0;transform:translateX(-70px)}

    /* SLIDE 1 */
    .cifras-slide{position:absolute;inset:0;padding:16px 40px 12px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:14px}
    .card{display:flex;flex-direction:column;justify-content:center;padding:20px 28px;border-radius:16px;position:relative;overflow:hidden;background:var(--light)}
    .card.hero{grid-column:span 2;background:linear-gradient(135deg,#FFF3EB,#FFE0CC)}
    .card-eyebrow{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:4px;display:flex;align-items:center;gap:5px}
    .card-eyebrow::before{content:'▶';font-size:9px;flex-shrink:0}
    .card.hero .card-eyebrow{font-size:18px}
    .card-value{font-size:clamp(44px,5vw,74px);font-weight:900;line-height:1;letter-spacing:-2px;margin-bottom:6px}
    .card.hero .card-value{font-size:clamp(52px,6.2vw,88px);color:var(--orange)}
    .v-purple{color:var(--purple)}.v-pink{color:var(--pink)}.v-teal{color:var(--teal)}.v-orange{color:var(--orange)}
    .card-sub{font-size:clamp(13px,1.3vw,17px);font-weight:700;color:#666;line-height:1.4}
    .highlight{font-size:clamp(15px,1.7vw,23px);font-weight:900;color:var(--orange)}
    .card::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:5px;border-radius:0 4px 4px 0}
    .bar-purple::before{background:var(--purple)}.bar-pink::before{background:var(--pink)}
    .bar-teal::before{background:var(--teal)}.bar-orange::before{background:var(--orange)}
    .hero::before{display:none}

    /* SLIDE 2 */
    .mapa-slide{position:absolute;inset:0;display:grid;grid-template-columns:1fr 280px;padding:10px 20px 8px 12px;gap:14px}
    .mapa-col{position:relative;display:flex;align-items:center;justify-content:center}
    #mapaSvg{height:100%;max-height:calc(100vh - 130px);width:auto}
    .reg-path{stroke:white;stroke-width:0.6;transition:fill .5s ease,filter .5s ease}

    .info-card{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%) scale(.88);
      background:white;border-radius:18px;
      padding:16px 22px 14px;
      box-shadow:0 10px 40px rgba(123,45,139,.22);
      border-left:6px solid var(--pink);
      width:210px;opacity:0;
      transition:opacity .4s ease,transform .4s ease;
      pointer-events:none;z-index:20;
    }
    .info-card.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .ic-region{font-size:10px;font-weight:800;color:#ccc;text-transform:uppercase;letter-spacing:.8px}
    .ic-name{font-size:18px;font-weight:900;color:#333;line-height:1.1;margin:3px 0 8px}
    .ic-val{font-size:46px;font-weight:900;color:var(--pink);line-height:1;letter-spacing:-2px}
    .ic-label{font-size:11px;font-weight:700;color:#aaa;margin-top:1px}
    .ic-bar{height:6px;background:#F0EBF8;border-radius:3px;margin-top:9px;overflow:hidden}
    .ic-fill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--purple),var(--pink));transition:width .5s ease}

    .prog-wrap{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10}
    .prog-dot{width:7px;height:7px;border-radius:50%;background:#E0D0EC;transition:all .3s}
    .prog-dot.on{background:var(--pink);width:18px;border-radius:3.5px}

    /* TOP 3 */
    .top3-col{display:flex;flex-direction:column;justify-content:center;gap:12px}
    .top3-titulo{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#888;margin-bottom:4px;display:flex;align-items:center;gap:5px}
    .top3-titulo::before{content:'▶';font-size:9px;color:var(--purple)}
    .top3-card{background:var(--light);border-radius:16px;padding:16px 18px;position:relative;overflow:hidden}
    .top3-card.t1{border-left:5px solid var(--purple)}
    .top3-card.t2{border-left:5px solid var(--pink)}
    .top3-card.t3{border-left:5px solid #C9A8E0}
    .top3-medal{position:absolute;top:10px;right:14px;font-size:22px;opacity:.5}
    .top3-rank{font-size:10px;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.5px}
    .top3-nombre{font-size:15px;font-weight:900;color:#333;margin:2px 0 4px;line-height:1.1}
    .top3-val{font-size:30px;font-weight:900;color:var(--purple);line-height:1;letter-spacing:-1px}
    .top3-label{font-size:10px;font-weight:700;color:#aaa}
    .top3-bar{height:5px;background:#EDE4F5;border-radius:3px;margin-top:8px;overflow:hidden}
    .top3-fill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--purple),var(--pink))}

    footer{display:flex;align-items:center;justify-content:center;padding:6px 0;gap:8px;flex-shrink:0;border-top:1px solid #F0F0F0}
    .dot-ind{width:9px;height:9px;border-radius:50%;background:#ddd;transition:background .4s,transform .4s;cursor:pointer}
    .dot-ind.on{background:var(--purple);transform:scale(1.3)}
    .loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#aaa;font-size:18px;font-weight:700}
    .spinner{width:42px;height:42px;border:4px solid #eee;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<header>
  <img class="logo" src="https://www.daleprofe.cl/img/logo.svg" alt="daleProfe"
    onerror="this.style.display='none';document.getElementById('lf').style.display='block'"/>
  <span id="lf" style="display:none;font-size:24px;font-weight:900;color:#FF6B00;">dale<span style="color:#333">Profe</span></span>
  <div class="header-right">
    <div class="since-badge">Nuestro impacto desde 2019</div>
    <div class="live-row">
      <div class="live-dot"></div>
      <span class="live-label">Cifras en vivo</span>
      <span class="last-updated" id="lastUpdated">· Cargando…</span>
    </div>
  </div>
</header>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <span>Conectando con daleprofe.cl…</span>
</div>

<div class="slides-wrap" id="slidesWrap" style="display:none">
  <div class="slide active" id="slide0">
    <div class="cifras-slide" id="cifrasGrid"></div>
  </div>
  <div class="slide" id="slide1">
    <div class="mapa-slide">
      <div class="mapa-col" id="mapaCol">
        <svg id="mapaSvg" viewBox="0 0 220 620" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="info-card" id="infoCard">
          <div class="ic-region" id="icRegion"></div>
          <div class="ic-name" id="icName"></div>
          <div class="ic-val" id="icVal"></div>
          <div class="ic-label">proyectos financiados</div>
          <div class="ic-bar"><div class="ic-fill" id="icFill"></div></div>
        </div>
        <div class="prog-wrap" id="progWrap"></div>
      </div>
      <div class="top3-col">
        <div class="top3-titulo">Top 3 regiones</div>
        <div id="top3List"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="dot-ind on" id="dot0" onclick="goToSlide(0)"></div>
  <div class="dot-ind" id="dot1" onclick="goToSlide(1)"></div>
</footer>

function fetchT(url,ms){
  return new Promise((rs,rj)=>{
    const t=setTimeout(()=>rj(new Error("timeout")),ms);
    fetch(url).then(r=>{clearTimeout(t);rs(r)}).catch(e=>{clearTimeout(t);rj(e)});
  });
}
const PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];

function parse(html){
  const text=(new DOMParser().parseFromString(html,"text/html").body.innerText||"").replace(/\s+/g," ");
  const f=p=>{const m=text.match(p);return m?m[1].trim():null};
  return{
    donaciones: f(/Hemos recaudado\s*([\$\d\.]+)/i),
    donantes:   f(/a trav[eé]s de\s+([\d\.]+)\s+donantes/i)||f(/([\d\.]+)\s+donantes de todo/i),
    proyFinanciados: f(/([\d\.]+)\s+Proyectos financiados/i),
    profesores:      f(/([\d\.]+)\s+Profesores beneficiados/i),
    colegios:        f(/([\d\.]+)\s+Colegios han participado/i),
    estudiantes:     f(/([\d\.]+)\s+Estudiantes beneficiados/i),
    activos:         f(/([\d\.]+)\s+Proyectos actualmente/i),
  };
}

async function fetchStats(){
  for(const pFn of PROXIES){
    try{
      const res=await fetchT(pFn(TARGET),14000);
      if(!res.ok) throw new Error("HTTP "+res.status);
      const html=await res.text();
      if(html.length<1000) throw new Error("vacío");
      const s=parse(html);
      if(s.donaciones&&s.proyFinanciados) return s;
      throw new Error("sin cifras");
    }catch(e){console.warn("proxy falló:",e.message);}
  }
  return FALLBACK;
}

      <div class="top3-val">${r.val.toLocaleString("es-CL")}</div>
      <div class="top3-label">proyectos financiados</div>
      <div class="top3-bar"><div class="top3-fill" style="width:${Math.round(r.val/maxVal*100)}%"></div></div>
    </div>`).join("");
}

const NS="http://www.w3.org/2000/svg";
const LON0=-76.2,LON1=-65.0,LAT0=-56.8,LAT1=-17.2;
const X0=8,X1=185,Y0=6,Y1=614;
function proj(lon,lat){return[X0+(lon-LON0)/(LON1-LON0)*(X1-X0),Y0+(1-(lat-LAT0)/(LAT1-LAT0))*(Y1-Y0)]}
function geomToD(geom){
  const polys=geom.type==="Polygon"?[geom.coordinates]:geom.coordinates;
  return polys.map(poly=>poly.map(ring=>
    ring.map(([lo,la],i)=>{const[x,y]=proj(lo,la);return(i===0?`M${x.toFixed(1)},${y.toFixed(1)}`:`L${x.toFixed(1)},${y.toFixed(1)}`)}).join(" ")+"Z"
  ).join(" ")).join(" ");
}
function getVisitedColor(val){
  const t=Math.pow(val/maxVal,0.5);
  const l=[237,219,247],d=[123,45,139];
  return`rgb(${Math.round(l[0]+(d[0]-l[0])*t)},${Math.round(l[1]+(d[1]-l[1])*t)},${Math.round(l[2]+(d[2]-l[2])*t)})`;
}

const pathByKey={};
function buildMapa(){
  const svg=document.getElementById("mapaSvg");
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const geoByKey={};
  GEO_JSON_DATA.forEach(f=>geoByKey[f.r]=f);
  REGIONES.forEach(r=>{
    const feat=geoByKey[r.geoKey];if(!feat)return;
    const path=document.createElementNS(NS,"path");
    path.setAttribute("d",geomToD(feat.g));
    path.setAttribute("fill","#EDE4F5");
    path.setAttribute("stroke","white");
    path.setAttribute("stroke-width","0.6");
    svg.appendChild(path);
    pathByKey[r.geoKey]=path;
  });
}

function buildDots(){
  document.getElementById("progWrap").innerHTML=
    REGIONES.map(()=>`<div class="prog-dot"></div>`).join("");
}

let animIdx=0, animTimer=null;
const visited=new Set();

function stepAnim(){
  if(animIdx>=REGIONES.length){
    // Todas mostradas — esperar 2s y volver a cifras
    setTimeout(()=>goToSlide(0), 2000);
    return;
  }
  const r=REGIONES[animIdx];
  REGIONES.forEach(rr=>{
    const p=pathByKey[rr.geoKey];if(!p)return;
    if(rr.geoKey===r.geoKey){
      p.setAttribute("fill","#E91E8C");
      p.style.filter="drop-shadow(0 0 10px rgba(233,30,140,.7))";
    } else if(visited.has(rr.geoKey)){
      p.setAttribute("fill",getVisitedColor(rr.val));
      p.style.filter="none";
    } else {
      p.setAttribute("fill","#EDE4F5");
      p.style.filter="none";
    }
  });
  visited.add(r.geoKey);
  const card=document.getElementById("infoCard");
  card.classList.remove("show");
  document.getElementById("icRegion").textContent="Región "+r.num+" de 16";
  document.getElementById("icName").textContent=r.nombre;
  document.getElementById("icVal").textContent=r.val.toLocaleString("es-CL");
  document.getElementById("icFill").style.width=Math.round(r.val/maxVal*100)+"%";
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add("show")));
  document.querySelectorAll(".prog-dot").forEach((d,i)=>d.classList.toggle("on",i===animIdx));
  animIdx++;
  animTimer=setTimeout(stepAnim,ANIM_STEP);
}

function startAnim(){
  stopAnim();
  animIdx=0; visited.clear();
  REGIONES.forEach(rr=>{const p=pathByKey[rr.geoKey];if(p){p.setAttribute("fill","#EDE4F5");p.style.filter="none";}});
  document.getElementById("infoCard").classList.remove("show");
  document.querySelectorAll(".prog-dot").forEach(d=>d.classList.remove("on"));
  setTimeout(stepAnim,600);
}
function stopAnim(){clearTimeout(animTimer);animTimer=null;document.getElementById("infoCard").classList.remove("show");}

let cur=0;
function goToSlide(n){
  document.getElementById(`slide${cur}`).classList.remove("active");
  document.getElementById(`slide${cur}`).classList.add("exit");
  document.getElementById(`dot${cur}`).classList.remove("on");
  const prev=cur; cur=n%2;
  setTimeout(()=>document.getElementById(`slide${prev}`).classList.remove("exit"),700);
  document.getElementById(`slide${cur}`).classList.add("active");
  document.getElementById(`dot${cur}`).classList.add("on");
  if(cur===1) setTimeout(startAnim,800);
  else{ stopAnim(); setTimeout(()=>goToSlide(1),14000); }
}

function setStatus(m){document.getElementById("lastUpdated").textContent="· "+m}

async function init(){
  setStatus("Conectando con daleprofe.cl…");
  try{
    const s=await fetchStats();
    renderCifras(s);
    buildTop3();
    buildMapa();
    buildDots();
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("slidesWrap").style.display="block";
    setTimeout(()=>goToSlide(1),14000);
    const h=new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
    setStatus(s===FALLBACK?"Últimas cifras conocidas · "+h:"Actualizado a las "+h);
  }catch(e){setStatus("Error — reintentando…");setTimeout(init,60000);}
}

// Refrescar cifras cada 30 min en segundo plano
setInterval(async()=>{
  const s=await fetchStats();
  renderCifras(s);
  const h=new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
  setStatus(s===FALLBACK?"Últimas cifras conocidas":"Actualizado a las "+h);
},30*60*1000);

init();
</script>
